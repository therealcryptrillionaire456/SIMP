apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectx-runtime
  labels:
    app: projectx-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projectx-runtime
  template:
    metadata:
      labels:
        app: projectx-runtime
    spec:
      containers:
        - name: projectx-runtime
          image: projectx-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5555
          envFrom:
            - configMapRef:
                name: projectx-runtime-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
